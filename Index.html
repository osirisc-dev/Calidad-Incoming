<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte Incoming | [NOMBRE_EMPRESA]</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #E60404;
            --secondary: #FFFFFF;
            --accent: #393D42;
            --bg-color: #f0f2f5;
            --text-body: #333333;
            --border-radius: 12px;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-body); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        
        .form-container { background-color: var(--secondary); padding: 0 0 30px 0; border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 600px; overflow: hidden; }
        
        .form-banner {
            width: 100%;
            background-color: #f8fafc;
            border-bottom: 4px solid var(--primary);
            padding: 20px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }
        .form-banner img { max-height: 55px; width: auto; display: block; }

        .form-content-padding { padding: 0 20px; }
        
        h2 { text-align: center; color: var(--accent); font-weight: 700; font-size: 24px; line-height: 1.3; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .brand-line { height: 4px; width: 60px; background-color: var(--primary); margin: 0 auto 30px auto; border-radius: 2px; }
        
        .tabs-container { display: flex; gap: 10px; margin-bottom: 25px; background: #f1f5f9; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; box-shadow: none; margin: 0; text-transform: none; letter-spacing: 0; }
        .tab-btn:hover { background-color: #e2e8f0; }
        .tab-btn.active { background-color: var(--secondary); color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: 700; font-size: 14px; }
        
        input[type="text"], input[type="email"], select {
            width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; background-color: #f9fafb;
            border-radius: 8px; box-sizing: border-box; font-size: 15px;
            font-family: 'Montserrat', sans-serif; transition: all 0.3s ease;
        }
        input:focus, select:focus { border-color: var(--primary); background-color: #fff; outline: none; box-shadow: 0 0 0 3px rgba(230, 4, 4, 0.1); }
        
        #zona-evaluacion { margin-top: 30px; border-top: 2px solid #e5e7eb; padding-top: 24px; display: none; }
        
        .evaluacion-item { 
            background-color: #ffffff; 
            border: 1px solid #e5e7eb; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
        }
        
        .pieza-header { margin-bottom: 16px; }
        .pieza-titulo { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
        .pieza-criterio { font-size: 12px; color: #6b7280; line-height: 1.4; display: block; }
        
        .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .radio-group input[type="radio"] { display: none; }
        .radio-group span { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 12px 8px; border: 2px solid #e5e7eb; border-radius: 8px; font-weight: 600; font-size: 14px; color: #6b7280; cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .radio-cumple input:checked + span { background-color: #ecfdf5; border-color: #10b981; color: #047857; }
        .radio-nocumple input:checked + span { background-color: #fef2f2; border-color: #ef4444; color: #b91c1c; }
        
        .comentario-input { width: 100%; padding: 12px; border: 1px solid #d1d5db; background-color: #f9fafb; border-radius: 8px; box-sizing: border-box; font-size: 14px; font-family: 'Montserrat', sans-serif; margin-bottom: 16px; }
        
        .custom-file-wrapper { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
        .custom-file-btn { background-color: #f8fafc; border: 2px dashed #cbd5e1; color: #475569; padding: 14px; text-align: center; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: block; font-size: 14px; }
        .texto-foto { font-size: 12px; color: #6b7280; text-align: center; font-weight: 600; }
        .foto-ok { color: #10b981; }

        .btn-submit { width: 100%; padding: 16px; background-color: var(--primary); color: var(--secondary); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; margin-top: 10px; transition: background-color 0.3s ease; box-shadow: 0 4px 6px rgba(230, 4, 4, 0.2); }
        .btn-submit:disabled { background-color: #9ca3af; cursor: not-allowed; box-shadow: none; }
        
        .estado-carga { text-align: center; font-size: 14px; color: var(--accent); margin-bottom: 15px; font-weight: 600;}
        .oculto { display: none !important; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-banner">
            <img src="https://lh3.googleusercontent.com/d/1c5U7sTFeN5nwEQvJ0pAC-vTvMbV_UJtc" alt="Logo [NOMBRE_EMPRESA]">
        </div>
        
        <div class="form-content-padding">
            <h2>Reporte Incoming</h2>
            <div class="brand-line"></div>
            
            <div class="tabs-container">
                <button type="button" id="btn-tab-maquinas" class="tab-btn active" onclick="cambiarModo('maquinas')">🤖 Máquinas</button>
                <button type="button" id="btn-tab-refacciones" class="tab-btn" onclick="cambiarModo('refacciones')">⚙️ Refacciones</button>
            </div>

            <form id="miFormulario">
                <div class="form-group">
                    <label for="correo">Correo Empresarial:</label>
                    <input type="email" id="correo" required pattern=".+@[TU_DOMINIO]\.com" placeholder="usuario@[TU_DOMINIO].com">
                </div>

                <div class="form-group">
                    <label for="contenedor">Referencia del contenedor:</label>
                    <input type="text" id="contenedor" required placeholder="Ej: CT-987">
                </div>
                
                <div class="form-group">
                    <label for="referencia">Referencia del Equipo/Factura (Antes STL):</label>
                    <input type="text" id="referencia" required placeholder="Ej: REF-001">
                </div>

                <div id="grupo-maquinas">
                    <div class="form-group">
                        <label for="serie">Número de Serie interno:</label>
                        <input type="text" id="serie" placeholder="Ej: SN-12345">
                    </div>
                    
                    <div class="form-group">
                        <label for="select-maquina">Selecciona el equipo:</label>
                        <div id="cargando-maquinas" class="estado-carga">Cargando catálogo... ⏳</div>
                        <select id="select-maquina" style="display: none;">
                            <option value="" disabled selected>-- Elige una opción técnica --</option>
                        </select>
                    </div>
                </div>

                <div id="grupo-refacciones" class="oculto">
                    <div class="form-group" style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <label for="buscador-codigo">🔍 Escanea o Ingresa AR Code / ERP Code:</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="buscador-codigo" placeholder="Ej: P04041" onkeypress="if(event.key === 'Enter') { event.preventDefault(); buscarRefaccion(); }">
                            <button type="button" onclick="buscarRefaccion()" style="width: auto; padding: 0 20px; border-radius: 8px; font-weight: bold; background: var(--accent); color: white; border: none; cursor: pointer;">Buscar</button>
                        </div>
                        <div id="mensaje-busqueda" style="font-size: 13px; margin-top: 8px; font-weight: bold;"></div>
                    </div>
                    <div id="cargando-refacciones" class="estado-carga">Cargando base de datos de refacciones... ⏳</div>
                </div>

                <div id="zona-evaluacion">
                    <div id="bloque-piezas"></div>
                    
                    <div class="form-group" id="contenedor-comentarios-generales" style="margin-top: 30px; border-top: 2px solid #e5e7eb; padding-top: 24px;">
                        <label for="comentarios-generales">Comentarios Adicionales de la Evaluación:</label>
                        <input type="text" id="comentarios-generales" placeholder="Opcional...">
                    </div>
                    
                    <div class="form-group" id="contenedor-disposicion">
                        <label for="disposicion">Disposición Final del Equipo:</label>
                        <select id="disposicion">
                            <option value="" disabled selected>-- Selecciona el Dictamen Técnico --</option>
                            <option value="Aceptado">Aceptado / Accepted</option>
                            <option value="Aceptado con Desviación">Aceptado con Desviación / Accepted with Deviation</option>
                            <option value="Rechazado">Rechazado / Rejected</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="btnEnviar" class="btn-submit">Enviar Reporte</button>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });
        
        const formulario = document.getElementById('miFormulario');
        const btnTabMaquinas = document.getElementById('btn-tab-maquinas');
        const btnTabRefacciones = document.getElementById('btn-tab-refacciones');
        
        const grupoMaquinas = document.getElementById('grupo-maquinas');
        const grupoRefacciones = document.getElementById('grupo-refacciones');
        
        const selectMaquina = document.getElementById('select-maquina');
        const inputSerie = document.getElementById('serie');
        const divDisposicionGeneral = document.getElementById('contenedor-disposicion');
        
        const zonaEvaluacion = document.getElementById('zona-evaluacion');
        const bloquePiezas = document.getElementById('bloque-piezas');
        const cargandoMaquinas = document.getElementById('cargando-maquinas');
        const cargandoRefacciones = document.getElementById('cargando-refacciones');
        const boton = document.getElementById('btnEnviar');
        
        let modoActual = 'maquinas'; 
        let baseDeDatosMaquinas = {};
        let listaRefacciones = []; 
        let refaccionActual = null; 

        window.onload = function() {
            google.script.run.withSuccessHandler(inicializarFormularioMaquinas).obtenerMaquinas();
            google.script.run.withSuccessHandler(inicializarListaRefacciones).obtenerRefacciones();
        };

        function cambiarModo(modo) {
            modoActual = modo;
            zonaEvaluacion.style.display = 'none';
            bloquePiezas.innerHTML = '';
            document.getElementById('mensaje-busqueda').innerText = '';
            document.getElementById('buscador-codigo').value = '';
            refaccionActual = null;
            
            const divDisposicionGeneral = document.getElementById('contenedor-disposicion');
            const divComentariosGenerales = document.getElementById('contenedor-comentarios-generales'); 
            
            if (modo === 'maquinas') {
                btnTabMaquinas.classList.add('active');
                btnTabRefacciones.classList.remove('active');
                grupoMaquinas.classList.remove('oculto');
                grupoRefacciones.classList.add('oculto');
                inputSerie.required = true;
                selectMaquina.required = true;
                
                divDisposicionGeneral.classList.remove('oculto');
                divComentariosGenerales.classList.remove('oculto'); 
                document.getElementById('disposicion').required = true;
            } else {
                btnTabRefacciones.classList.add('active');
                btnTabMaquinas.classList.remove('active');
                grupoRefacciones.classList.remove('oculto');
                grupoMaquinas.classList.add('oculto');
                inputSerie.required = false;
                selectMaquina.required = false;
                
                divDisposicionGeneral.classList.add('oculto');
                divComentariosGenerales.classList.add('oculto'); 
                document.getElementById('disposicion').required = false;
                
                if(!listaRefacciones || listaRefacciones.length === 0){
                    cargandoRefacciones.style.display = 'block';
                    cargandoRefacciones.innerText = 'No hay refacciones pendientes en la hoja de carga.';
                } else {
                    cargandoRefacciones.style.display = 'none';
                }
            }
        }

        function inicializarFormularioMaquinas(datos) {
            baseDeDatosMaquinas = datos;
            Object.keys(baseDeDatosMaquinas).sort().forEach(nombre => {
                let opcion = document.createElement('option');
                opcion.value = nombre; opcion.textContent = nombre;
                selectMaquina.appendChild(opcion);
            });
            cargandoMaquinas.style.display = 'none';
            selectMaquina.style.display = 'block';
        }

        function inicializarListaRefacciones(datos) {
            listaRefacciones = datos;
            cargandoRefacciones.style.display = 'none';
        }

        function generarBloqueHTML(index, tituloVisual, subtitulo, tituloBackend, identificador, mostrarDisposicion = false) {
            let htmlDisp = "";
            if (mostrarDisposicion) {
                htmlDisp = `
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e5e7eb;">
                    <label style="font-size: 13px; margin-bottom: 6px; display: block; font-weight: bold; color: var(--accent);">Disposición de esta refacción:</label>
                    <select id="disp_item_${index}" required style="padding: 10px; font-size: 13px; width: 100%; border-radius: 6px; border: 1px solid #d1d5db;">
                        <option value="" disabled selected>-- Dictamen Técnico --</option>
                        <option value="Aceptado">Aceptado / Accepted</option>
                        <option value="Aceptado con Desviación">Aceptado con Desviación / Accpt. w/ Deviation</option>
                        <option value="Rechazado">Rechazado / Rejected</option>
                    </select>
                </div>`;
            }

            return `
            <div class="evaluacion-item">
                <div class="pieza-header">
                    <div class="pieza-titulo">${tituloVisual}</div>
                    ${subtitulo ? `<span class="pieza-criterio" style="margin-top: 6px;">${subtitulo}</span>` : ''}
                </div>
                
                <div class="radio-group">
                    <label class="radio-cumple">
                        <input type="radio" name="eval_${index}" value="Cumple" required>
                        <span>✅ Cumple</span>
                    </label>
                    <label class="radio-nocumple">
                        <input type="radio" name="eval_${index}" value="No cumple" required>
                        <span>❌ No cumple</span>
                    </label>
                </div>
                
                ${htmlDisp}
                
                <input type="text" class="comentario-input" id="comentario_${index}" placeholder="✍️ Comentarios u observaciones..." style="margin-top:15px;">
                
                <div class="custom-file-wrapper">
                    <label for="foto_${index}" class="custom-file-btn">📸 Añadir Evidencia Fotográfica</label>
                    <input type="file" id="foto_${index}" style="display:none;" accept="image/*" capture="environment" onchange="actualizarTextoFoto(this, ${index})">
                    <span id="texto-foto-${index}" class="texto-foto">Ninguna foto seleccionada</span>
                </div>
                <input type="hidden" id="nombreEval_${index}" value="${tituloBackend}">
                <input type="hidden" id="idEval_${index}" value="${identificador}">
            </div>`;
        }

        // --- BUSCADOR DE REFACCIONES ---
        function buscarRefaccion() {
            const query = document.getElementById('buscador-codigo').value.trim().toUpperCase();
            const msj = document.getElementById('mensaje-busqueda');
            bloquePiezas.innerHTML = '';
            zonaEvaluacion.style.display = 'none';
            refaccionActual = null;

            if (!query) { msj.innerText = "⚠️ Ingresa un código válido."; msj.style.color = "#E60404"; return; }

            const item = listaRefacciones.find(r => r.arCode.toUpperCase() === query || r.erpCode.toUpperCase() === query);

            if (item) {
                msj.innerText = "✅ Refacción encontrada."; msj.style.color = "#10b981";
                refaccionActual = item; 
                
                let tituloVisual = `<span style="color: #64748b;">AR:</span> ${item.arCode} &nbsp;&nbsp;|&nbsp;&nbsp; <span style="color: #64748b;">ERP:</span> ${item.erpCode} 
                                    <br><span style="font-size: 14px; font-weight: normal; color: #4A5568; display: block; margin-top: 4px;">${item.descripcion}</span>`;
                let tituloBackend = `NP: ${item.erpCode} - ${item.descripcion}`;
                let subtitulo = `Ordenado: <b>${item.ordenado}</b> &nbsp;&nbsp;|&nbsp;&nbsp; Enviado (A revisar): <b style="color: var(--primary); font-size: 14px;">${item.enviado}</b>`;
                
                bloquePiezas.innerHTML = generarBloqueHTML(0, tituloVisual, subtitulo, tituloBackend, item.erpCode, true);
                zonaEvaluacion.style.display = 'block';
            } else {
                msj.innerText = "❌ Código no encontrado en la lista de pendientes."; msj.style.color = "#E60404";
            }
        }

        selectMaquina.addEventListener('change', function() {
            const maquinaElegida = selectMaquina.value;
            const piezas = baseDeDatosMaquinas[maquinaElegida];
            bloquePiezas.innerHTML = ''; 

            if (piezas && piezas.length > 0) {
                let htmlContenido = `<h3 style="color: var(--accent); margin-bottom: 24px; font-size: 20px;">Equipo: <span style="color: var(--primary);">${maquinaElegida}</span></h3>`;
                piezas.forEach((item, index) => {
                    htmlContenido += generarBloqueHTML(index, item.pieza, item.criterio, item.pieza, "Pieza", false);
                });
                bloquePiezas.innerHTML = htmlContenido;
                zonaEvaluacion.style.display = 'block';
            }
        });

        window.actualizarTextoFoto = function(input, index) {
            const spanTexto = document.getElementById(`texto-foto-${index}`);
            if (input.files && input.files.length > 0) {
                spanTexto.innerHTML = `✅ Evidencia lista: ${input.files[0].name}`;
                spanTexto.classList.add('foto-ok');
            } else {
                spanTexto.innerHTML = "Ninguna foto seleccionada";
                spanTexto.classList.remove('foto-ok');
            }
        };

        function optimizarImagen(file, maxWidth = 1024, maxHeight = 1024, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Calcular nuevas proporciones
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round(height *= maxWidth / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round(width *= maxHeight / height);
                                height = maxHeight;
                            }
                        }

                        // Dibujar en el canvas con las nuevas dimensiones
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Exportar como JPEG comprimido
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(dataUrl);
                    };
                    
                    img.onerror = error => reject(error);
                };
                
                reader.onerror = error => reject(error);
            });
        }

        formulario.addEventListener('submit', async function(evento) {
            evento.preventDefault();
            boton.disabled = true;
            boton.innerText = "Subiendo datos... ⏳"; 

            const totalItems = modoActual === 'maquinas' ? baseDeDatosMaquinas[selectMaquina.value].length : 1;
            const referenciaComun = document.getElementById('referencia').value;
            let evaluaciones = [];

            try {
                for (let i = 0; i < totalItems; i++) {
                    const seleccion = document.querySelector(`input[name="eval_${i}"]:checked`).value;
                    const comentario = document.getElementById(`comentario_${i}`).value.trim();
                    const fotoInput = document.getElementById(`foto_${i}`);
                    const nombreEval = document.getElementById(`nombreEval_${i}`).value;
                    const idEval = document.getElementById(`idEval_${i}`).value;
                    
                    let cantidadEval = "N/A";
                    let disposicionIndividual = "N/A";
                    
                    if (modoActual === 'refacciones' && refaccionActual) {
                        cantidadEval = refaccionActual.enviado;
                        disposicionIndividual = document.getElementById(`disp_item_${i}`).value;
                    }
                    
                    let fotoBase64 = null;
                    let fotoNombre = null;

                    if (fotoInput.files.length > 0) {
                        const file = fotoInput.files[0];
                        fotoBase64 = await optimizarImagen(file);
                        
                        if(modoActual === 'maquinas'){
                            const serieEquipo = document.getElementById('serie').value;
                            fotoNombre = `Serie_${serieEquipo}_${nombreEval}_${file.name}`;
                        } else {
                            fotoNombre = `Ref_${referenciaComun}_${idEval}_${file.name}`;
                        }
                    }

                    evaluaciones.push({
                        pieza: nombreEval, 
                        cantidad: cantidadEval,
                        disposicionItem: disposicionIndividual, 
                        seleccion: seleccion,
                        comentario: comentario,
                        fotoBase64: fotoBase64,
                        fotoNombre: fotoNombre
                    });
                }

                const datosBase = {
                    correo: document.getElementById('correo').value,
                    contenedor: document.getElementById('contenedor').value,
                    referencia: referenciaComun, 
                    comentariosGenerales: document.getElementById('comentarios-generales').value.trim(), 
                    disposicion: document.getElementById('disposicion') ? document.getElementById('disposicion').value : "N/A",
                    evaluaciones: evaluaciones,
                    codigoRefaccion: (modoActual === 'refacciones' && refaccionActual) ? refaccionActual.erpCode : null 
                };

                if (modoActual === 'maquinas') {
                    datosBase.serie = document.getElementById('serie').value;
                    datosBase.nombreMaquina = selectMaquina.value;
                    google.script.run.withSuccessHandler(exitoEnvio).withFailureHandler(fallaEnvio).guardarDatos(datosBase);
                } else {
                    google.script.run.withSuccessHandler(exitoEnvio).withFailureHandler(fallaEnvio).guardarRefacciones(datosBase); 
                }

            } catch (error) {
                alert("Error al procesar imágenes.");
                boton.disabled = false;
                boton.innerText = "ENVIAR REPORTE";
            }
        });

        function exitoEnvio(respuesta) {
            if(respuesta === "Éxito") {
                if(modoActual === 'maquinas') {
                    alert("¡Reporte de Máquina enviado!");
                    formulario.reset();
                    cambiarModo('maquinas');
                } else {
                    listaRefacciones = listaRefacciones.filter(r => r.erpCode !== refaccionActual.erpCode);

                    document.getElementById('buscador-codigo').value = '';
                    document.getElementById('mensaje-busqueda').innerText = '✅ Guardado. Escanea la siguiente refacción.';
                    document.getElementById('mensaje-busqueda').style.color = '#3b82f6';
                    document.getElementById('comentarios-generales').value = '';
                    bloquePiezas.innerHTML = '';
                    zonaEvaluacion.style.display = 'none';
                    refaccionActual = null;
                    document.getElementById('buscador-codigo').focus(); 
                }
            } else {
                alert("Error: " + respuesta);
            }
            boton.disabled = false;
            boton.innerText = "ENVIAR REPORTE";
        }

        function fallaEnvio(error) {
            alert("Falla de red o error del servidor.");
            boton.disabled = false;
            boton.innerText = "ENVIAR REPORTE";
        }
    </script>
